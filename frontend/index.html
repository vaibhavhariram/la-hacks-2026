<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Aegis-Route Command Center</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0d0d1a; }

    /* Cesium takes the full viewport */
    #cesium-container {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    /* Hide Cesium's default credits bar — we'll keep the attribution text */
    .cesium-widget-credits { display: none !important; }

    /* UI overlay sits on top of Cesium, pointer-events off except buttons */
    #ui-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
      font-family: 'Courier New', monospace;
    }

    #title {
      position: absolute;
      top: 20px; left: 20px;
      color: #ffffff;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 4px;
      text-shadow: 0 0 15px #0088ff, 0 0 30px #0044aa;
    }

    #subtitle {
      position: absolute;
      top: 48px; left: 20px;
      color: #0088ff;
      font-size: 11px;
      letter-spacing: 2px;
      opacity: 0.8;
    }

    #status {
      position: absolute;
      top: 20px; right: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #ffffff;
      font-size: 13px;
      background: rgba(0,0,0,0.5);
      padding: 6px 12px;
      border: 1px solid #333;
    }

    #status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #ff4444;
      transition: background 0.3s;
      box-shadow: 0 0 6px #ff4444;
    }

    #status-dot.connected {
      background: #00ff88;
      box-shadow: 0 0 6px #00ff88;
    }

    #instructions {
      position: absolute;
      bottom: 90px; left: 20px;
      color: #cccccc;
      font-size: 12px;
      line-height: 2;
      background: rgba(0,0,0,0.55);
      padding: 10px 14px;
      border-left: 2px solid #0088ff;
    }

    #vr-button-container {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      pointer-events: all;
    }

    .action-btn {
      padding: 12px 28px;
      background: rgba(13,13,26,0.85);
      border: 1px solid #0088ff;
      color: #0088ff;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(4px);
    }

    .action-btn:hover {
      background: #0088ff;
      color: #0d0d1a;
      box-shadow: 0 0 20px #0088ff;
    }

    .action-btn.danger {
      border-color: #ff4400;
      color: #ff4400;
    }

    .action-btn.danger:hover {
      background: #ff4400;
      color: #0d0d1a;
      box-shadow: 0 0 20px #ff4400;
    }

    #replay-overlay {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      display: none;
      background: rgba(0,0,0,0.7);
      padding: 10px 24px;
      border: 1px solid #ff4400;
    }

    #replay-overlay.active { display: block; }

    #replay-label {
      color: #ff4400;
      font-size: 13px;
      letter-spacing: 4px;
      font-weight: bold;
      text-shadow: 0 0 10px #ff4400;
      margin-bottom: 4px;
    }

    #replay-time {
      color: #ffaa00;
      font-size: 20px;
      letter-spacing: 2px;
      text-shadow: 0 0 8px #ffaa00;
    }

    #home-btn {
      position: absolute;
      top: 20px;
      right: 160px;
      pointer-events: all;
    }
  </style>
</head>
<body>

  <!-- Cesium globe renders here -->
  <div id="cesium-container"></div>

  <!-- HUD overlay -->
  <div id="ui-overlay">

    <div id="title">AEGIS-ROUTE</div>
    <div id="subtitle">REAL-TIME EMERGENCY ROUTING — EATON FIRE, ALTADENA CA</div>

    <div id="status">
      <div id="status-dot"></div>
      <span id="status-text">CONNECTING</span>
    </div>

    <button class="action-btn" id="home-btn" style="pointer-events:all; font-size:11px; padding:6px 14px; letter-spacing:1px;">⌂ ALTADENA</button>

    <div id="instructions">
      Click to set START point<br>
      Click again to set END point<br>
      Click again to dispatch route
    </div>

    <div id="replay-overlay">
      <div id="replay-label">● EATON FIRE REPLAY</div>
      <div id="replay-time">Jan 8, 2025 — 11:47 PM</div>
    </div>

    <div id="vr-button-container">
      <button class="action-btn" id="demo-route-btn">DEMO ROUTE</button>
      <button class="action-btn danger" id="replay-btn">REPLAY EATON FIRE</button>
      <button class="action-btn" id="enter-vr-btn">ENTER VR</button>
    </div>

  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
